# Builds binary wheels and a source distribution.
# - Release-triggered runs publish to TestPyPI first, then PyPI.
# - Manually dispatched runs on the release-please branch publish to TestPyPI
#   using a unique PEP 440 dev version for iterative pre-release testing.
#
# Prerequisites (one-time setup):
#   1. Create the "pythonscad" projects on PyPI and TestPyPI:
#      - https://pypi.org/project/pythonscad/
#      - https://test.pypi.org/project/pythonscad/
#   2. Configure trusted publishing for this repository in both indexes:
#      PyPI/TestPyPI project settings -> Publishing -> Add a new publisher
#      - Owner: pythonscad
#      - Repository: pythonscad
#      - Workflow name: publish-to-pypi.yml
#      - Environment names: pypi (PyPI), testpypi (TestPyPI)
name: Publish to PyPI

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: macos-15-intel
          - os: macos-15
          - os: windows-2022
    steps:
      - run: |
          git config --global submodule.fetchJobs 8
          git config --global core.longpaths true

      - uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Fetch tags for version detection
        run: |
          git fetch --unshallow --tags || git fetch --tags
          git describe --tags --always --dirty

      - name: Set dynamic version for manual TestPyPI runs
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/release-please--branches--master--components--pythonscad'
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(grep -Eo '^[0-9]+\.[0-9]+(\.[0-9]+)?' VERSION.txt | head -n1 || true)"
          if [[ -z "${base_version}" ]]; then
            echo "Unable to derive base version from VERSION.txt" >&2
            exit 1
          fi
          if tag=$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null); then
            distance=$(git rev-list --count "${tag}..HEAD")
          else
            distance=$(git rev-list --count HEAD)
          fi
          sha=$(git rev-parse --short=10 HEAD)
          dev_version="${base_version}.dev${distance}"
          echo "PYTHONSCAD_VERSION_OVERRIDE=${dev_version}" >> "$GITHUB_ENV"
          echo "Using dynamic package version: ${dev_version} (sha ${sha})"

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Install build tooling
        run: uv sync --frozen --only-group build --no-install-project

      - name: Add build tools to PATH
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            echo "${GITHUB_WORKSPACE}/.venv/Scripts" >> "$GITHUB_PATH"
          else
            echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"
          fi

      - name: Setup MSYS2 parser tools
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: MSYS
          update: false
          install: >-
            flex
            bison

      - name: Add MSYS2 parser tools to PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/msys64/usr/bin" >> "$GITHUB_PATH"

      - name: Restore Windows vcpkg cache
        id: windows-vcpkg-cache
        if: github.event_name == 'workflow_dispatch' && runner.os == 'Windows'
        uses: actions/cache/restore@v6
        with:
          # actions/cache versions include this path list; keep .wheel-vcpkg here
          # so older wheel caches remain restorable across workflow changes.
          path: |
            .wheel-vcpkg
            .wheel-vcpkg-cache
            ~/AppData/Local/vcpkg/archives
          key: pypi-windows-vcpkg-${{ hashFiles('scripts/cibuildwheel/vcpkg.json', 'scripts/cibuildwheel/install-deps-windows.ps1') }}
          restore-keys: |
            pypi-windows-vcpkg-

      - name: Install Windows wheel dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: ${{ github.event_name == 'workflow_dispatch' && format('clear;files,{0}/.wheel-vcpkg-cache,readwrite', github.workspace) || '' }}
        run: ./scripts/cibuildwheel/install-deps-windows.ps1

      - name: Prune Windows vcpkg cache
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($path in @(
            ".wheel-vcpkg\buildtrees",
            ".wheel-vcpkg\downloads",
            ".wheel-vcpkg\packages"
          )) {
            if (Test-Path $path) {
              Remove-Item -Recurse -Force $path
            }
          }

      - name: Save Windows vcpkg cache
        if: >-
          github.event_name == 'workflow_dispatch' &&
          runner.os == 'Windows' &&
          steps.windows-vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          # Keep this in sync with the restore path list above.
          path: |
            .wheel-vcpkg
            .wheel-vcpkg-cache
            ~/AppData/Local/vcpkg/archives
          key: ${{ steps.windows-vcpkg-cache.outputs.cache-primary-key }}

      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          CIBW_BEFORE_ALL_WINDOWS: python -c "print('Windows wheel dependencies already installed by workflow')"

      - uses: actions/upload-artifact@v7
        with:
          name: pypi-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Fetch tags for version detection
        run: |
          git fetch --unshallow --tags || git fetch --tags
          git describe --tags --always --dirty

      - name: Set dynamic version for manual TestPyPI runs
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/release-please--branches--master--components--pythonscad'
        shell: bash
        run: |
          set -euo pipefail
          base_version="$(grep -Eo '^[0-9]+\.[0-9]+(\.[0-9]+)?' VERSION.txt | head -n1 || true)"
          if [[ -z "${base_version}" ]]; then
            echo "Unable to derive base version from VERSION.txt" >&2
            exit 1
          fi
          if tag=$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null); then
            distance=$(git rev-list --count "${tag}..HEAD")
          else
            distance=$(git rev-list --count HEAD)
          fi
          sha=$(git rev-parse --short=10 HEAD)
          dev_version="${base_version}.dev${distance}"
          echo "PYTHONSCAD_VERSION_OVERRIDE=${dev_version}" >> "$GITHUB_ENV"
          echo "Using dynamic package version: ${dev_version} (sha ${sha})"

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Install build frontend
        run: uv sync --frozen --only-group build --no-install-project

      - name: Build sdist
        run: uv run --no-sync python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: pypi-sdist
          path: dist/*.tar.gz

  publish-to-test-pypi:
    name: Publish to test PyPI
    needs: [build-wheels, build-sdist]
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/release-please--branches--master--components--pythonscad')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: pypi-*
          merge-multiple: true
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
  publish-to-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, publish-to-test-pypi]
    if: >
      github.event_name == 'release' &&
      github.event.action == 'released' &&
      !github.event.release.prerelease
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: pypi-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

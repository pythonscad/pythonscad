name: Build and Upload AppImage

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Release tag to upload to (leave empty for test build)'
        required: false
        default: ''
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false
      artifact_retention_days:
        type: number
        description: 'Retention in days for optional AppImage artifacts (0 disables artifact upload)'
        required: false
        default: 0

permissions:
  contents: read
  actions: read

jobs:
  build-appimage:
    name: Build AppImage (Qt${{ matrix.qt_version }} / ${{ matrix.arch }})
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        qt_version: [5, 6]
        arch: [x86_64]
        include:
          - qt_version: 5
            profile: pythonscad-qt5
          - qt_version: 6
            profile: pythonscad-qt6

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        submodules: 'recursive'
        persist-credentials: false

    - name: Fetch tags for version detection
      run: |
        git fetch --unshallow --tags || git fetch --tags
        git describe --tags --always --dirty

    - name: Setup (detached) tmate session if enabled
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
      uses: mxschmitt/action-tmate@v3
      timeout-minutes: 5
      with:
        detached: true
        limit-access-to-actor: true

    - name: Validate artifact retention
      id: retention
      env:
        REQUESTED_RETENTION_DAYS: ${{ github.event.inputs.artifact_retention_days || '0' }}
      run: |
        case "$REQUESTED_RETENTION_DAYS" in
          ''|*[!0-9]*)
            echo "Artifact retention must be an integer number of days." >&2
            exit 1
            ;;
        esac
        if [ "$REQUESTED_RETENTION_DAYS" -gt 90 ]; then
          echo "Artifact retention must be between 0 and 90 days." >&2
          exit 1
        fi
        echo "days=$REQUESTED_RETENTION_DAYS" >> "$GITHUB_OUTPUT"
        if [ "$REQUESTED_RETENTION_DAYS" -gt 0 ]; then
          echo "upload=true" >> "$GITHUB_OUTPUT"
        else
          echo "upload=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up QEMU for ARM64
      if: matrix.arch == 'aarch64'
      uses: docker/setup-qemu-action@v4
      with:
        platforms: arm64

    - name: Install dependencies (x86_64)
      if: matrix.arch == 'x86_64'
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: Etc/UTC
      run: |
        sudo apt-get update
        sudo -E ./scripts/get-dependencies.py --yes --profile ${{ matrix.profile }}
        sudo apt-get install -y wget curl file libfuse2

    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: false

    - name: Download matching WASM sandbox bundle
      env:
        GH_TOKEN: ${{ github.token }}
      run: bash .github/scripts/download-wasm-artifact.sh "$(git rev-parse HEAD)" wasm-bundle

    - name: Build AppImage (x86_64)
      if: matrix.arch == 'x86_64'
      env:
        QT_VERSION: ${{ matrix.qt_version }}
        ARCH: ${{ matrix.arch }}
        PYTHONSCAD_WASM_BUNDLE_DIR: ${{ github.workspace }}/wasm-bundle
      run: |
        chmod +x ./scripts/create_appimage.sh
        ./scripts/create_appimage.sh

    - name: Build AppImage (aarch64) in Docker
      if: matrix.arch == 'aarch64'
      run: |
        # Run the entire build inside a Docker container with proper ARM64 emulation
        docker run --rm \
          --platform linux/arm64 \
          -v "$PWD:/workspace" \
          -w /workspace \
          -e QT_VERSION=${{ matrix.qt_version }} \
          -e ARCH=aarch64 \
          -e PYTHONSCAD_WASM_BUNDLE_DIR=/workspace/wasm-bundle \
          -e DEBIAN_FRONTEND=noninteractive \
          -e TZ=Etc/UTC \
          ubuntu:24.04 \
          bash -c '
            set -e
            apt-get update
            apt-get install -y git python3 wget curl file libfuse2
            ./scripts/get-dependencies.py --yes --profile ${{ matrix.profile }}
            chmod +x ./scripts/create_appimage.sh
            ./scripts/create_appimage.sh
          '

    - name: Get AppImage filename
      id: appimage
      run: |
        APPIMAGE_FILE=$(find dist -maxdepth 1 -name 'PythonSCAD-*.AppImage' | head -1)
        if [ -z "$APPIMAGE_FILE" ] || [ ! -f "$APPIMAGE_FILE" ]; then
          echo "ERROR: No AppImage found in dist/" >&2
          exit 1
        fi
        echo "filename=$(basename "${APPIMAGE_FILE}")" >> "$GITHUB_OUTPUT"
        echo "filepath=${APPIMAGE_FILE}" >> "$GITHUB_OUTPUT"

    - name: Sign AppImage (release only)
      id: sign
      if: github.event_name == 'release' || github.event.inputs.upload_to_release != ''
      env:
        DEB_SIGNING_KEY: ${{ secrets.DEB_SIGNING_KEY }}
        GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        STEPS_APPIMAGE_OUTPUTS_FILEPATH: ${{ steps.appimage.outputs.filepath }}
      run: |
        set -e
        APPIMAGE_FILE="${STEPS_APPIMAGE_OUTPUTS_FILEPATH}"
        if [ ! -f "$APPIMAGE_FILE" ]; then
          echo "AppImage not found: $APPIMAGE_FILE"
          exit 1
        fi
        sudo apt-get update -qq || true
        sudo apt-get install -y -qq gnupg 2>/dev/null || true
        export GNUPGHOME="${HOME}/.gnupg"
        mkdir -p "$GNUPGHOME"
        chmod 700 "$GNUPGHOME"
        printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
        gpgconf --kill gpg-agent 2>/dev/null || true
        # `printf '%s'` rather than `echo` so that signing keys
        # containing `-n` / `-e` / backslash sequences are passed to
        # `gpg --import` byte-for-byte instead of being interpreted
        # by the shell builtin.
        printf '%s' "$DEB_SIGNING_KEY" | gpg --batch --import
        printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 \
          -u "$GPG_KEY_ID" --detach-sign --armor "$APPIMAGE_FILE"
        echo "Signed: ${APPIMAGE_FILE}.asc"
        gpg --verify "${APPIMAGE_FILE}.asc" "$APPIMAGE_FILE"
        echo "asc_path=${APPIMAGE_FILE}.asc" >> "$GITHUB_OUTPUT"

    - name: Upload AppImage as artifact
      if: steps.retention.outputs.upload == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: pythonscad-qt${{ matrix.qt_version }}-${{ matrix.arch }}-appimage
        path: ${{ steps.appimage.outputs.filepath }}
        retention-days: ${{ steps.retention.outputs.days }}

    - name: Upload AppImage to release
      if: github.event_name == 'release' || github.event.inputs.upload_to_release != ''
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.upload_to_release }}
        STEPS_APPIMAGE_OUTPUTS_FILEPATH: ${{ steps.appimage.outputs.filepath }}
        STEPS_SIGN_OUTPUTS_ASC_PATH: ${{ steps.sign.outputs.asc_path }}
      run: |
        UPLOAD_ARGS=("$STEPS_APPIMAGE_OUTPUTS_FILEPATH")
        if [ -n "$STEPS_SIGN_OUTPUTS_ASC_PATH" ]; then
          UPLOAD_ARGS+=("$STEPS_SIGN_OUTPUTS_ASC_PATH")
        fi
        gh release upload "$RELEASE_TAG" "${UPLOAD_ARGS[@]}" --clobber

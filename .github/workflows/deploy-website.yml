name: Deploy Website

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

concurrency:
  group: deploy-website
  cancel-in-progress: false

jobs:
  deploy-website:
    name: Build and deploy mkdocs website
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup (detached) tmate session if enabled
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          detached: true
          limit-access-to-actor: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Create virtual environment and install dependencies
        run: |
          cd web
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Build mkdocs site
        run: |
          cd web
          source .venv/bin/activate
          mkdocs build --strict

      - name: Setup SSH key for SFTP
        run: |
          mkdir -p ~/.ssh
          # `printf` (not `echo`) so backslash escapes / option-looking
          # leading bytes in the key material are written byte-faithfully.
          printf '%s' "$WEB_SFTP_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Setup SSH known_hosts
          PORT="${WEB_SFTP_PORT:-22}"
          if [ "$PORT" = "22" ]; then
            ssh-keyscan -H "$VARS_WEB_SFTP_HOST" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$PORT" -H "$VARS_WEB_SFTP_HOST" >> ~/.ssh/known_hosts
          fi
        env:
          WEB_SFTP_SSH_KEY: ${{ secrets.WEB_SFTP_SSH_KEY }}
          WEB_SFTP_PORT: ${{ vars.WEB_SFTP_PORT }}
          VARS_WEB_SFTP_HOST: ${{ vars.WEB_SFTP_HOST }}

      - name: Deploy to SFTP server
        run: |
          PORT="${WEB_SFTP_PORT:-22}"

          # Don't pass `StrictHostKeyChecking=no` here: the previous
          # step populated `~/.ssh/known_hosts` with the live host
          # key via `ssh-keyscan`, and ssh's default behaviour
          # (`StrictHostKeyChecking=accept-new`/`yes` depending on
          # version) honours that pin. Disabling strict checking
          # would silently accept any key that happens to answer on
          # the deploy host's address — i.e. the very MITM the
          # ssh-keyscan + known_hosts dance is meant to prevent.
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT" \
            web/site/ \
            "${VARS_WEB_SFTP_USER}@${VARS_WEB_SFTP_HOST}:${VARS_WEB_SFTP_PATH}/"
        env:
          WEB_SFTP_PORT: ${{ vars.WEB_SFTP_PORT }}
          VARS_WEB_SFTP_USER: ${{ vars.WEB_SFTP_USER }}
          VARS_WEB_SFTP_HOST: ${{ vars.WEB_SFTP_HOST }}
          VARS_WEB_SFTP_PATH: ${{ vars.WEB_SFTP_PATH }}

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

name: Windows(msys2) Experimental Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

jobs:
  build:
    strategy:
      matrix:
        qt: [ qt5, qt6 ]
    runs-on: windows-latest
    name: windows-latest ${{ matrix.qt }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Setup (detached) tmate session if enabled
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 5
        with:
          detached: true
          limit-access-to-actor: true
      - name: Setup MSYS2 Environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
      - name: Install MSYS2 Dependencies
        run: |
          pwd
          ./scripts/msys2-install-dependencies.sh ${{ matrix.qt }}
      - name: Install Mesa
        uses: ssciwr/setup-mesa-dist-win@v2
        with:
          version: '22.1.7'
          build-type: 'release-mingw'
      - name: Build OpenSCAD
        run: |
          mkdir build && cd build
          cmake .. -G"Ninja" -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release -DEXPERIMENTAL=ON -DSNAPSHOT=ON -DUSE_QT6=${{ matrix.qt == 'qt6' && 'ON' || 'OFF' }}
          cmake --build . -j4
          cmake --install . --prefix=.
      - name: Run Test Suite
        run: |
          cd build
          ctest -j4

      - name: Upload Test Result Report
        uses: actions/upload-artifact@v5
        if: ${{ always() }}
        with:
          name: Test Result Report (Windows ${{ matrix.qt }})
          path: |
            build/Testing/Temporary/*_report.html
            build/Testing/Temporary/LastTest.log

      - name: Install NSIS for packaging
        if: github.event_name != 'pull_request'
        run: |
          pacman --noconfirm -S mingw-w64-ucrt-x86_64-nsis

      - name: Bundle runtime dependencies
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          cd build
          # Find and copy all DLL dependencies
          echo "Copying MinGW runtime dependencies..."

          # Get the pythonscad executable path
          EXE_PATH=$(find . -name "pythonscad.exe" -type f | head -1)
          if [ -z "$EXE_PATH" ]; then
            echo "Error: pythonscad.exe not found"
            exit 1
          fi

          EXE_DIR=$(dirname "$EXE_PATH")
          echo "Found executable at: $EXE_PATH"
          echo "Installing DLLs to: $EXE_DIR"

          # Use ntldd to find all dependencies, filter for ucrt64 DLLs, and copy them
          pacman --noconfirm -S mingw-w64-ucrt-x86_64-ntldd-git

          # Get all DLL dependencies and copy them
          ntldd -R "$EXE_PATH" | grep -i "ucrt64" | awk '{print $3}' | sort -u | while read dll; do
            if [ -f "$dll" ]; then
              echo "Copying: $(basename $dll)"
              cp "$dll" "$EXE_DIR/"
            fi
          done

          echo "DLL bundling complete"
          ls -lh "$EXE_DIR"/*.dll | head -20

      - name: Create distribution packages
        if: github.event_name != 'pull_request'
        run: |
          cd build
          cpack -G "ZIP;NSIS"

      - name: Find and prepare packages
        if: github.event_name != 'pull_request'
        id: packages
        shell: bash
        env:
          QT_VERSION: ${{ matrix.qt }}
        run: |
          cd build
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -1 || echo "")
          EXE_FILE=$(ls *.exe 2>/dev/null | head -1 || echo "")

          if [ -n "$ZIP_FILE" ]; then
            # Extract ZIP to avoid double-zipping when downloading from GitHub
            ZIP_DIR="${ZIP_FILE%.zip}"
            mkdir -p "$ZIP_DIR"
            unzip -q "$ZIP_FILE" -d "$ZIP_DIR"

            # Insert Qt version after "PythonSCAD-" in artifact name (without .zip extension)
            ARTIFACT_NAME="${ZIP_FILE%.zip}"
            ARTIFACT_NAME="${ARTIFACT_NAME/PythonSCAD-/PythonSCAD-${QT_VERSION}-}"

            echo "zip_path=build/$ZIP_DIR" >> $GITHUB_OUTPUT
            echo "zip_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
            echo "Found ZIP: $ZIP_FILE (extracted to: $ZIP_DIR, artifact: $ARTIFACT_NAME)"
          fi

          if [ -n "$EXE_FILE" ]; then
            # Insert Qt version after "PythonSCAD-" in artifact name (without .exe extension)
            ARTIFACT_NAME="${EXE_FILE%.exe}"
            ARTIFACT_NAME="${ARTIFACT_NAME/PythonSCAD-/PythonSCAD-${QT_VERSION}-}"

            echo "exe_path=build/$EXE_FILE" >> $GITHUB_OUTPUT
            echo "exe_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
            echo "Found EXE: $EXE_FILE (artifact: $ARTIFACT_NAME)"
          fi

      - name: Upload ZIP package
        if: github.event_name != 'pull_request' && steps.packages.outputs.zip_name != ''
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.packages.outputs.zip_name }}
          path: ${{ steps.packages.outputs.zip_path }}
          retention-days: 30

      - name: Upload NSIS installer
        if: github.event_name != 'pull_request' && steps.packages.outputs.exe_name != ''
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.packages.outputs.exe_name }}
          path: ${{ steps.packages.outputs.exe_path }}
          retention-days: 30

      - name: Setup (detached) tmate session if enabled
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

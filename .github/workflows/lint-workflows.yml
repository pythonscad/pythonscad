name: Lint workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'
      - '.github/dependabot.yml'
  push:
    branches: [master]
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'
      - '.github/dependabot.yml'

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # `raharper/actionlint-action` would also work, but we want the
      # exact same binary version pre-commit uses, so install via
      # the upstream installer script and invoke directly.
      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          mv actionlint "$HOME/.local/bin/actionlint" || sudo mv actionlint /usr/local/bin/actionlint

      - name: Run actionlint
        run: actionlint -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so that zizmor can post SARIF findings to the
      # repository's Security tab.
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install zizmor
        run: pip install zizmor==1.24.1

      - name: Run zizmor (block on high-severity findings)
        run: zizmor --min-severity=high --format=plain .

      - name: Run zizmor (full SARIF report)
        if: always()
        run: zizmor --format=sarif . > zizmor.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor

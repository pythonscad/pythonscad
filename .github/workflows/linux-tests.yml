name: Linux Experimental Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04 ]
        qt: [ qt5, qt6 ]

    runs-on: ${{ matrix.os }}

    name: ${{ matrix.os }} ${{ matrix.qt }}

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: 'recursive'
        persist-credentials: false
    - name: Fetch tags for version detection
      run: |
        git fetch --unshallow --tags || git fetch --tags
        git describe --tags --always --dirty
    - name: Install dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: Etc/UTC
      run: |
        which sudo || ( apt update && apt install -y sudo )
        sudo -E ./scripts/get-dependencies.py --yes --profile pythonscad-${{ matrix.qt }}
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
    - name: Install gcovr
      run: uv sync --frozen --project .github/ci/openscad-coverage
    - name: Install Python test dependencies (IPython + pexpect for --ipython tests)
      run: |
        # ipython and pexpect must be importable by the *system*
        # python3 because that is what the embedded interpreter
        # resolves at runtime. `--break-system-packages` is the
        # standard PEP 668 escape hatch on Ubuntu 24.04+.
        python3 -m pip install --break-system-packages --upgrade pip \
          || python3 -m pip install --upgrade pip
        python3 -m pip install --break-system-packages --upgrade 'ipython>=9,<10' pexpect \
          || python3 -m pip install --upgrade 'ipython>=9,<10' pexpect
    - name: Build
      run: ./scripts/github-ci.sh experimental enable_python enable_libfive ${{ matrix.qt }} build
    - name: Download matching WASM sandbox bundle
      env:
        GH_TOKEN: ${{ github.token }}
        TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      run: bash .github/scripts/download-wasm-artifact.sh "$TARGET_SHA" wasm-bundle
    - name: Run Test Suite
      env:
        PYTHONSCAD_WASM_DIR: ${{ github.workspace }}/wasm-bundle
        PYTHONSCAD_SANDBOX_RUNNER: ${{ github.workspace }}/scripts/python-sandbox-runner.mjs
      run: ./scripts/github-ci.sh test coverage
    - name: Upload Test Result Report
      uses: actions/upload-artifact@v7
      if: ${{ always() }}
      with:
        name: Test Result Report (${{ matrix.os }} ${{ matrix.qt }})
        path: |
          b/Testing/Temporary/*_report.html
          b/Testing/Temporary/LastTest.log
    - name: Upload Code Coverage Report
      uses: actions/upload-artifact@v7
      with:
        name: Code Coverage Report (${{ matrix.os }} ${{ matrix.qt }})
        path: c/coverage*.html

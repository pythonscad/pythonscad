name: pre-commit

on:
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # On `pull_request`, the default checkout ref is GitHub's
          # synthetic merge commit (`refs/pull/N/merge`), which mixes
          # the base branch's tip into the PR's content. `pre-commit`
          # hooks read file content from the working tree, so without
          # this pin they'd lint *merged* content instead of pure
          # PR-head content. With `master` advancing after the PR is
          # opened, that means the required check could fail on
          # changes the PR never made. Pin to the head SHA so the
          # working tree is exactly what the PR is proposing.
          ref: ${{ github.event.pull_request.head.sha }}
          # `pre-commit run --from-ref/--to-ref` needs both PR base and
          # head SHAs in history to compute the diff to lint.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit (PR diff)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # `pull_request.base.sha` is the current tip of the base
          # branch, not the merge base with the head branch. If
          # `master` advances after the PR is opened, comparing
          # against `base.sha` would lint files that changed on
          # `master` but never in this PR. Use the merge-base so the
          # diff is exactly the PR's contribution.
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          echo "MERGE_BASE=$MERGE_BASE" >> "$GITHUB_ENV"
          pre-commit run --from-ref "$MERGE_BASE" --to-ref "$HEAD_SHA" \
                         --show-diff-on-failure --color always

      - name: Re-run file-scoped hooks against full target set
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # `pre-commit run --from-ref/--to-ref` only runs hooks
          # against files in the PR diff. That has a known gap: a PR
          # whose only change is `.pre-commit-config.yaml` (e.g. the
          # weekly autoupdate PRs from pre-commit-autoupdate.yml) has
          # an empty target file set for every file-scoped hook, so
          # rev/arg bumps for `actionlint`, `zizmor`, etc. would
          # never be exercised in CI.
          #
          # When the config file is in the diff, additionally run
          # the hooks that are known to be clean across the full
          # codebase against `--all-files`, so a breaking rev bump
          # is caught at PR time.
          #
          # The list is intentionally small for now â€” `actionlint`
          # and `zizmor` only target `.github/workflows/**`, which
          # this PR cleaned up. Other file-scoped hooks
          # (`shellcheck`, `clang-format`, `markdownlint-cli2`,
          # `trailing-whitespace`, ...) have a pre-existing legacy
          # backlog tracked in #613; once cleared, they should be
          # added here too.
          if ! git diff --name-only "$MERGE_BASE" "$HEAD_SHA" \
               | grep -qx '.pre-commit-config.yaml'; then
            echo "No .pre-commit-config.yaml change; skipping cross-config validation."
            exit 0
          fi
          echo ".pre-commit-config.yaml is in the diff â€” running file-scoped hooks against --all-files."
          pre-commit run actionlint --all-files --color always
          pre-commit run zizmor     --all-files --color always

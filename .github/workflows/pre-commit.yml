name: pre-commit

on:
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # On `pull_request`, the default checkout ref is GitHub's
          # synthetic merge commit (`refs/pull/N/merge`), which mixes
          # the base branch's tip into the PR's content. `pre-commit`
          # hooks read file content from the working tree, so without
          # this pin they'd lint *merged* content instead of pure
          # PR-head content. With `master` advancing after the PR is
          # opened, that means the required check could fail on
          # changes the PR never made. Pin to the head SHA so the
          # working tree is exactly what the PR is proposing.
          ref: ${{ github.event.pull_request.head.sha }}
          # `pre-commit run --from-ref/--to-ref` needs both PR base and
          # head SHAs in history to compute the diff to lint.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit (PR diff)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # `pull_request.base.sha` is the current tip of the base
          # branch, not the merge base with the head branch. If
          # `master` advances after the PR is opened, comparing
          # against `base.sha` would lint files that changed on
          # `master` but never in this PR. Use the merge-base so the
          # diff is exactly the PR's contribution.
          MERGE_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          echo "MERGE_BASE=$MERGE_BASE" >> "$GITHUB_ENV"
          pre-commit run --from-ref "$MERGE_BASE" --to-ref "$HEAD_SHA" \
                         --show-diff-on-failure --color always

      - name: Re-run file-scoped hooks against full target set
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # `pre-commit run --from-ref/--to-ref` only runs hooks
          # against files in the PR diff. That has a known gap: a PR
          # whose only change is hook configuration (e.g. the weekly
          # autoupdate PRs from `pre-commit-autoupdate.yml`, or a PR
          # tweaking `.github/zizmor.yml`'s allowlist) has an empty
          # target file set for every file-scoped hook, so rev/arg
          # bumps and policy changes would never be exercised in CI.
          #
          # When any of those config files are in the diff,
          # additionally run the hooks that are known to be clean
          # across the full codebase against `--all-files`, so a
          # breaking config change is caught at PR time.
          #
          # Trigger files:
          #   - `.pre-commit-config.yaml`: hook list, revs, args
          #   - `.github/zizmor.yml`:      zizmor's allowlists / ignores
          #
          # Hooks rerun:
          #   - `actionlint`, `zizmor`: `.github/workflows/**` is
          #     `--min-severity=high`-clean as of this PR.
          #   - `ruff`:                  scoped to
          #     `libraries/python/stubs/`, kept deliberately small and
          #     clean.
          #
          # Hooks deferred (pre-existing legacy backlog tracked in #613):
          #   `shellcheck` (`tests/compare-bitmaps.sh` SC1072/SC1073;
          #   `tests/virtualfb.sh` SC2046/SC2048/...), `clang-format`,
          #   `markdownlint-cli2`, `trailing-whitespace` /
          #   `end-of-file-fixer`. Once cleared, they should be added
          #   here too. Until then, a hook-rev bump for one of those
          #   hooks merging without `--all-files` validation is the
          #   accepted trade-off; it would still be exercised by the
          #   very next PR that touches a file in that hook's scope.
          changed=$(git diff --name-only "$MERGE_BASE" "$HEAD_SHA")
          if ! printf '%s\n' "$changed" \
               | grep -qE '^(\.pre-commit-config\.yaml|\.github/zizmor\.yml)$'; then
            echo "No hook-config change in diff; skipping cross-config validation."
            exit 0
          fi
          echo "Hook-config change detected — running clean-codebase hooks against --all-files."
          pre-commit run actionlint --all-files --color always
          pre-commit run zizmor     --all-files --color always
          pre-commit run ruff       --all-files --color always
